<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TranspiTrack — Invitations d'amis</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>

<div class="layout">

    <nav class="sidebar">
        <div class="sidebar-logo">
            <div class="sidebar-logo-icon">🏃</div>
            <div>
                <div class="sidebar-logo-text">TranspiTrack</div>
            </div>
        </div>
        <span class="sidebar-section-label">Menu</span>
        <a th:href="@{/activities}"><i class="bi bi-card-list"></i> Mes Activités</a>
        <a th:href="@{/dashboard}"><i class="bi bi-graph-up"></i> Tableau de bord</a>
        <span class="sidebar-section-label mt-3">Réseau</span>
        <a th:href="@{/users/profile}"><i class="bi bi-person"></i> Mon Profil</a>
        <a href="#" class="active"><i class="bi bi-envelope"></i> Invitations</a>
    </nav>

    <main class="main">

        <div class="alert-tt alert-info mb-4" th:if="${msg != null and !msg.isEmpty()}">
            <i class="bi bi-info-circle-fill alert-tt-icon"></i>
            <div class="alert-tt-content"><div class="desc" th:text="${msg}"></div></div>
            <i class="bi bi-x-lg alert-tt-close" onclick="this.closest('.alert-tt').remove()"></i>
        </div>

        <div class="page-header d-flex align-items-center justify-content-between">
            <div>
                <h1>Mes invitations d'amis</h1>
                <p>Gérez vos demandes de connexion.</p>
            </div>
            <a th:href="@{/users/profile}" class="btn-tt btn-outline-secondary">
                <i class="bi bi-arrow-left"></i> Retour au profil
            </a>
        </div>

        <section class="section">
            <div class="empty-state" th:if="${#lists.isEmpty(friendInvites)}" style="max-width: 500px;">
                <div class="empty-state-icon">🙌</div>
                <div class="empty-state-title">Aucune invitation en attente</div>
                <div class="empty-state-desc">Vous êtes à jour dans vos demandes d'amis.</div>
            </div>

            <div class="d-flex flex-column gap-16" th:if="${!#lists.isEmpty(friendInvites)}" style="max-width: 600px;">
                <div class="card-tt p-3 d-flex align-items-center justify-content-between" th:each="invite : ${friendInvites}">
                    <div class="d-flex align-items-center gap-12">
                        <div class="avatar" style="background:var(--primary)">
                            <i class="bi bi-person-fill"></i>
                        </div>
                        <div class="fw-700" th:text="${invite.requester.name}">Nom de l'ami</div>
                    </div>
                    <div class="d-flex gap-8">
                        <form th:action="@{/users/friends/accept/{id}(id=${invite.id})}" method="post" class="m-0">
                            <button type="submit" class="btn-tt btn-accent btn-sm"><i class="bi bi-check-lg"></i> Accepter</button>
                        </form>
                        <form th:action="@{/users/friends/reject/{id}(id=${invite.id})}" method="post" class="m-0">
                            <button type="submit" class="btn-tt btn-danger btn-sm"><i class="bi bi-x-lg"></i> Refuser</button>
                        </form>
                    </div>
                </div>
            </div>
        </section>

    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
