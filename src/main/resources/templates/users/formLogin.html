<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TranspiTrack — Connexion</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <th:block th:replace="~{fragments/notifications :: notif-styles}"></th:block>
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height: 100vh; background: var(--bg); padding: 20px;">

    <div class="card-tt p-5" style="width: 100%; max-width: 420px;">
        
        <div class="text-center mb-4">
            <div class="sidebar-logo-icon mx-auto mb-3" style="width: 56px; height: 56px; font-size: 28px;">🏃</div>
            <h2 class="tt-h2 mb-1">Bon retour !</h2>
            <p class="text-muted-tt mb-0">Connectez-vous à votre compte</p>
        </div>

        <form action="/users/loginUser" method="POST">
            
            <div class="form-group">
                <label class="form-label" for="emailUser">Adresse Email <span class="required">*</span></label>
                <div class="input-icon-wrap">
                    <i class="bi bi-envelope input-icon"></i>
                    <input type="text" class="form-control" placeholder="Entrez votre email" name="email" id="emailUser" required/>
                </div>
            </div>

            <div class="form-group mb-4">
                <label class="form-label" for="passwordUser">Mot de passe <span class="required">*</span></label>
                <div class="input-icon-wrap">
                    <i class="bi bi-lock input-icon"></i>
                    <input type="password" class="form-control" placeholder="Entrez votre mot de passe" name="password" id="passwordUser" required/>
                </div>
            </div>

            <button type="submit" class="btn-tt btn-primary w-100 justify-content-center mb-3" style="padding: 12px;">
                Se connecter <i class="bi bi-arrow-right"></i>
            </button>
        </form>

        <div class="divider"></div>

        <div class="text-center">
            <span class="tt-label">Pas encore de compte ?</span>
            <a th:href="@{/users/formCreate}" class="btn-tt btn-outline-secondary btn-sm mt-2 w-100 justify-content-center">
                Créer un compte
            </a>
        </div>

    </div>

<th:block th:replace="~{fragments/notifications :: notif-container}"></th:block>
</body>
</html>
