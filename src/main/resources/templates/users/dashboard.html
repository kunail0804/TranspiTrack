<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TranspiTrack — Dashboard</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <th:block th:replace="~{fragments/sidebar :: sidebar-styles}"></th:block>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* Style spécifique pour les lignes dépliables du tableau */
        .activity-details {
            display: none;
            background-color: var(--bg);
        }
        .activity-details.open {
            display: table-row;
        }
        .activity-details td {
            padding: 16px 24px !important;
            border-bottom: 2px solid var(--border) !important;
        }
    </style>
    <th:block th:replace="~{fragments/notifications :: notif-styles}"></th:block>
</head>
<body>

<div class="layout">

    <nav th:replace="~{fragments/sidebar :: sidebar-nav(activePage='dashboard')}"></nav>

    <main class="main">

        <div class="page-header">
            <h1>Dashboard</h1>
            <p>Analysez vos performances globales et l'historique de vos sessions.</p>
        </div>

        <div class="card-tt mb-4" th:if="${weather != null}">
            <div style="display:flex; align-items:center; gap:24px; padding:20px 24px; flex-wrap:wrap;">
                <div style="display:flex; align-items:center; gap:16px; flex:0 0 auto;">
                    <span style="font-size:3rem; line-height:1;">🌤️</span>
                    <div>
                        <div style="font-size:2.2rem; font-weight:700; line-height:1; color:var(--text)">
                            <span th:text="${weather.currentTemp}">20</span>°C
                        </div>
                        <div style="font-weight:600; color:var(--text-muted)" th:text="${weather.weatherCondition}">Ensoleillé</div>
                        <div style="font-size:0.85rem; color:var(--text-muted)">
                            📍 <span th:text="${weather.city}">Paris</span>
                        </div>
                    </div>
                </div>
                <div style="width:1px; height:64px; background:var(--border); flex-shrink:0;"></div>
                <div style="display:flex; gap:16px; flex-wrap:wrap;">
                    <div th:each="day,iter : ${weather.forecast}" th:if="${iter.index < 5}"
                         style="text-align:center; min-width:44px;">
                        <div style="font-size:0.72rem; color:var(--text-muted); font-weight:500"
                             th:text="${#strings.replace(#strings.substring(day.getDate(),5),'-','/')}">04/16</div>
                        <div style="font-size:0.9rem; font-weight:700; color:var(--text)" th:text="|${day.getMaxTemp()}°|">22°</div>
                        <div style="font-size:0.8rem; color:var(--text-muted)" th:text="|${day.getMinTemp()}°|">14°</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card-tt stat-card mb-4" style="max-width: 300px;">
            <div class="stat-card-header">
                <div>
                    <div class="stat-card-label">Total calories dépensées</div>
                    <div class="stat-card-value">
                        <span th:text="${#numbers.formatDecimal(totalCalories, 1, 1)}"></span>
                        <small style="font-size:1rem;font-weight:500;color:var(--text-muted)">kcal</small>
                    </div>
                </div>
                <div class="stat-card-icon" style="background:#FFF7ED; color:#F97316">🔥</div>
            </div>
        </div>

        <section class="section mb-5">
            <h3 class="section-title"><i class="bi bi-bar-chart"></i> Stats par sport</h3>
            <table class="table-tt">
                <thead>
                    <tr>
                        <th>Sport</th>
                        <th>Distance (km)</th>
                        <th>Durée (min)</th>
                        <th>Sessions</th>
                        <th>Calories (kcal)</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="sport : ${distanceBySport.keySet()}">
                        <td class="fw-700" th:text="${sport.name}"></td>
                        <td th:text="${distanceBySport.get(sport)}"></td>
                        <td th:text="${durationBySport.get(sport)}"></td>
                        <td th:text="${countBySport.get(sport)}"></td>
                        <td class="fw-700 text-primary" th:text="${#numbers.formatDecimal(caloriesBySport.get(sport), 1, 1)}"></td>
                    </tr>
                </tbody>
            </table>
        </section>

        <div class="d-flex flex-wrap gap-16 mb-5">
            <div class="card-tt p-4 flex-fill" style="min-width: 400px;">
                <h4 class="tt-label mb-3">Distance par sport (km)</h4>
                <div style="height: 300px;">
                    <canvas id="chartDistance"></canvas>
                </div>
            </div>

            <div class="card-tt p-4 flex-fill" style="min-width: 400px;">
                <h4 class="tt-label mb-3">Calories par sport (kcal)</h4>
                <div style="height: 300px;">
                    <canvas id="chartCalories"></canvas>
                </div>
            </div>
        </div>

    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script th:inline="javascript">
    /*<![CDATA[*/

    // Couleurs de la charte
    const themeColors = [
        'rgba(255, 107, 53, 0.8)',  // Primary
        'rgba(0, 200, 150, 0.8)',   // Accent
        'rgba(59, 130, 246, 0.8)',  // Info
        'rgba(245, 158, 11, 0.8)',  // Warning
        'rgba(239, 68, 68, 0.8)',   // Danger
        'rgba(45, 58, 80, 0.8)'     // Secondary Light
    ];

    // Graphique distance
    let distanceData = /*[[${distanceBySportName}]]*/ {};
    let distanceLabels = Object.keys(distanceData);
    let distanceValues = Object.values(distanceData);
    let distanceColors = distanceLabels.map((_, index) => themeColors[index % themeColors.length]);

    if(document.getElementById('chartDistance')) {
        new Chart(document.getElementById('chartDistance'), {
            type: 'bar',
            data: {
                labels: distanceLabels,
                datasets: [{
                    label: 'Distance (km)',
                    data: distanceValues,
                    backgroundColor: distanceColors,
                    borderWidth: 0
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });
    }

    // Graphique calories
    let caloriesData = /*[[${caloriesBySportName}]]*/ {};
    let caloriesLabels = Object.keys(caloriesData);
    let caloriesValues = Object.values(caloriesData);
    let caloriesColors = caloriesLabels.map((_, index) => themeColors[index % themeColors.length]);

    if(document.getElementById('chartCalories')) {
        new Chart(document.getElementById('chartCalories'), {
            type: 'bar',
            data: {
                labels: caloriesLabels,
                datasets: [{
                    label: 'Calories (kcal)',
                    data: caloriesValues,
                    backgroundColor: caloriesColors,
                    borderWidth: 0
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });
    }

    /*]]>*/
</script>

<th:block th:replace="~{fragments/notifications :: notif-container}"></th:block>
</body>
</html>
