<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TranspiTrack — Créer un compte</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height: 100vh; background: var(--bg); padding: 40px 20px;">

    <div class="card-tt p-4 p-md-5" style="width: 100%; max-width: 680px;">
        
        <div class="text-center mb-4">
            <div class="sidebar-logo-icon mx-auto mb-3" style="width: 48px; height: 48px; font-size: 24px;">🏃</div>
            <h2 class="tt-h2 mb-1">Rejoignez TranspiTrack</h2>
            <p class="text-muted-tt mb-0">Créez votre compte pour suivre vos performances</p>
        </div>

        <div class="alert-tt alert-info mb-4" th:if="${message != null and !message.isEmpty()}">
            <i class="bi bi-info-circle-fill alert-tt-icon"></i>
            <div class="alert-tt-content"><div class="desc" th:text="${message}"></div></div>
            <i class="bi bi-x-lg alert-tt-close" onclick="this.closest('.alert-tt').remove()"></i>
        </div>

        <form action="/users/createUser" method="POST">
            
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px;">
                
                <div class="form-group mb-0">
                    <label class="form-label" for="firstNameUser">Prénom <span class="required">*</span></label>
                    <input type="text" class="form-control" placeholder="Ex: Jean" name="firstName" id="firstNameUser" required/>
                </div>

                <div class="form-group mb-0">
                    <label class="form-label" for="NameUser">Nom <span class="required">*</span></label>
                    <input type="text" class="form-control" placeholder="Ex: Dupont" name="name" id="NameUser" required/>
                </div>

                <div class="form-group mb-0">
                    <label class="form-label" for="emailUser">Email <span class="required">*</span></label>
                    <div class="input-icon-wrap">
                        <i class="bi bi-envelope input-icon"></i>
                        <input type="email" class="form-control" placeholder="jean@example.com" name="email" id="emailUser" required/>
                    </div>
                </div>

                <div class="form-group mb-0">
                    <label class="form-label" for="passwordUser">Mot de passe <span class="required">*</span></label>
                    <div class="input-icon-wrap">
                        <i class="bi bi-lock input-icon"></i>
                        <input type="password" class="form-control" placeholder="Votre mot de passe secret" name="password" id="passwordUser" required/>
                    </div>
                </div>

                <div class="form-group mb-0">
                    <label class="form-label" for="ageUser">Âge <span class="required">*</span></label>
                    <input type="number" class="form-control" placeholder="Ex: 28" name="age" id="ageUser" required/>
                </div>

                <div class="form-group mb-0">
                    <label class="form-label" for="gender-select">Sexe <span class="required">*</span></label>
                    <select class="form-select" name="gender" id="gender-select" required>
                        <option value="" disabled selected>-- Sexe --</option>
                        <option value="MALE">Homme (M)</option>
                        <option value="FEMALE">Femme (F)</option>
                    </select>
                </div>

                <div class="form-group mb-0">
                    <label class="form-label" for="heightUser">Taille (m) <span class="required">*</span></label>
                    <div class="input-icon-wrap">
                        <i class="bi bi-rulers input-icon"></i>
                        <input type="number" step="0.01" class="form-control" placeholder="Ex: 1.75" name="height" id="heightUser" required/>
                    </div>
                </div>

                <div class="form-group mb-0">
                    <label class="form-label" for="weightUser">Poids (kg) <span class="required">*</span></label>
                    <div class="input-icon-wrap">
                        <i class="bi bi-speedometer input-icon"></i>
                        <input type="number" step="0.01" class="form-control" placeholder="Ex: 70.5" name="weight" id="weightUser" required/>
                    </div>
                </div>

                <div class="form-group mb-0" style="grid-column: 1 / -1;">
                    <label class="form-label" for="cityUser">Ville <span class="required">*</span></label>
                    <div class="input-icon-wrap">
                        <i class="bi bi-geo-alt input-icon"></i>
                        <input type="text" class="form-control" placeholder="Ex: Paris" name="city" id="cityUser" required/>
                    </div>
                </div>

            </div>

            <button type="submit" class="btn-tt btn-primary w-100 justify-content-center mt-4 mb-3" style="padding: 12px;">
                Créer mon compte
            </button>

        </form>

        <div class="text-center mt-3">
            <span class="tt-label">Vous avez déjà un compte ?</span>
            <a th:href="@{/users/formLogin}" class="btn-tt btn-ghost btn-sm ms-2">
                Se connecter
            </a>
        </div>

    </div>

</body>
</html>
