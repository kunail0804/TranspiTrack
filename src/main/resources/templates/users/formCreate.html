<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Creer un compte</title>
</head>
<body>
<p th:text = "${message}"></p>
<form action="/users/createUser" method="POST" enctype="multipart/form-data">
    Prenom : <input type="text" placeholder = "Entrez votre prenom" name="firstName" id="firstNameUser" required/><br>
    nom : <input type="text" placeholder = "Entrez votre nom" name="name" id="NameUser" required/><br>
    Age : <input type="number" placeholder = "Entrez votre age" name="age" id="ageUser" required/><br>
    Taille : <input type="number" step="0.01" placeholder = "Entrez votre taille" name="height" id="heightUser" required/><br>
    Poids : <input type="number" step="0.01" placeholder = "Entrez votre poids" name="weight" id="weightUser" required/><br>
    <label for="gender-select">Selectionnez le sexe:</label>
    <select name="gender" id="gender-select" required>
        <option value="">--Choisissez votre sexe--</option>
        <option value="MALE">M</option>
        <option value="FEMALE">F</option>
    </select>
    Email : <input type="text" placeholder = "Entrez votre email" name="email" id="emailUser" required/><br>
    Mot de passe : <input type="password" placeholder = "Entrez votre mot de passe" name="password" id="passwordUser" required/><br>
    Ville : <input type="text" placeholder = "Entrez votre nom de ville" name="city" id="cityUser" required/><br>

    <label for="profileImageInput">Photo de profil (optionnel) :</label><br>
    <input type="file" name="profileImage" id="profileImageInput" accept="image/*"/><br>
    <div id="imagePreviewWrapper" style="display:none; margin-top:8px;">
        <img id="imagePreview" src="#" alt="Aperçu"
             style="width:100px; height:100px; border-radius:50%; object-fit:cover; border:2px solid #ccc;"/>
    </div>

    <button type="submit">Creer un nouveau compte</button>
</form>

<script>
    document.getElementById('profileImageInput').addEventListener('change', function () {
        const file = this.files[0];
        const wrapper = document.getElementById('imagePreviewWrapper');
        const preview = document.getElementById('imagePreview');
        if (file) {
            preview.src = URL.createObjectURL(file);
            wrapper.style.display = 'block';
        } else {
            wrapper.style.display = 'none';
        }
    });
</script>

<a th:href="@{/users/formLogin}">
    <button>Se connecter</button>
</a>
</body>
</html>
