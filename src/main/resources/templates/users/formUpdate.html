<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TranspiTrack — Modifier mon compte</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>
<div class="layout">
    <nav class="sidebar">
        <div class="sidebar-logo">
            <div class="sidebar-logo-icon">&#x1F3C3;</div>
            <div><div class="sidebar-logo-text">TranspiTrack</div></div>
        </div>
        <span class="sidebar-section-label">Menu</span>
        <a th:href="@{/activities}"><i class="bi bi-card-list"></i> Mes Activit&#xe9;s</a>
        <a th:href="@{/activities/add}"><i class="bi bi-plus-circle"></i> Nouvelle Activit&#xe9;</a>
        <a th:href="@{/dashboard}"><i class="bi bi-graph-up"></i> Tableau de bord</a>
        <span class="sidebar-section-label mt-3">Param&#xe8;tres</span>
        <a href="#" class="active"><i class="bi bi-person-gear"></i> Mon Profil</a>
        <div style="margin-top:auto;padding:20px;">
            <form action="/users/logout" method="GET">
                <button type="submit" class="btn-tt btn-outline-secondary" style="width:100%;border-color:rgba(255,255,255,0.2);color:#fff;">
                    <i class="bi bi-box-arrow-right"></i> Se d&#xe9;connecter
                </button>
            </form>
        </div>
    </nav>

    <main class="main">

        <div class="page-header">
            <h1>Mon Profil</h1>
            <p>Mettez &#xe0; jour vos informations personnelles.</p>
        </div>

        <section class="section">
            <div class="form-card" style="max-width:800px;">

                <div class="alert-tt alert-info mb-4" th:if="${message != null and !message.isEmpty()}">
                    <i class="bi bi-info-circle-fill alert-tt-icon"></i>
                    <div class="alert-tt-content"><div class="desc" th:text="${message}"></div></div>
                    <button type="button" class="alert-tt-close" onclick="this.closest('.alert-tt').remove()" aria-label="Fermer"><i class="bi bi-x-lg"></i></button>
                </div>

                <form action="/users/updateUser" method="POST" enctype="multipart/form-data">

                    <h4 class="tt-label mb-3 border-bottom pb-2">Photo de profil</h4>
                    <div class="d-flex align-items-center gap-16 mb-4">
                        <img id="imagePreview"
                             th:src="${user.profileImage != null} ? @{/images/users/{f}(f=${user.profileImage})} : @{/images/users/placeholder.png}"
                             alt="Profil actuel"
                             style="width:90px;height:90px;border-radius:50%;object-fit:cover;border:3px solid var(--border);flex-shrink:0;"/>
                        <div style="flex:1;">
                            <label class="form-label" for="profileImageInput"><i class="bi bi-camera"></i> Changer la photo</label>
                            <input type="file" class="form-control" name="profileImage" id="profileImageInput" accept="image/*"/>
                        </div>
                        <div th:if="${user.profileImage != null}">
                            <button type="button" class="btn-tt btn-outline-secondary btn-sm" onclick="document.getElementById('deleteImageForm').submit()">
                                <i class="bi bi-trash"></i> Supprimer
                            </button>
                        </div>
                    </div>

                    <h4 class="tt-label mb-3 border-bottom pb-2">Informations G&#xe9;n&#xe9;rales</h4>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:30px;">
                        <div class="form-group mb-0">
                            <label class="form-label" for="firstNameUser">Pr&#xe9;nom <span class="required">*</span></label>
                            <input type="text" class="form-control" th:value="${user.getFirstName()}" placeholder="Entrez votre prenom" name="firstName" id="firstNameUser" required/>
                        </div>
                        <div class="form-group mb-0">
                            <label class="form-label" for="NameUser">Nom <span class="required">*</span></label>
                            <input type="text" class="form-control" th:value="${user.getName()}" placeholder="Entrez votre nom" name="name" id="NameUser" required/>
                        </div>
                        <div class="form-group mb-0">
                            <label class="form-label" for="emailUser">Email <span class="required">*</span></label>
                            <div class="input-icon-wrap">
                                <i class="bi bi-envelope input-icon"></i>
                                <input type="email" class="form-control" th:value="${user.getEmail()}" placeholder="Entrez votre email" name="email" id="emailUser" required/>
                            </div>
                        </div>
                        <div class="form-group mb-0">
                            <label class="form-label" for="cityUser">Ville <span class="required">*</span></label>
                            <div class="input-icon-wrap">
                                <i class="bi bi-geo-alt input-icon"></i>
                                <input type="text" class="form-control" th:value="${user.getCity()}" placeholder="Entrez votre nom de ville" name="city" id="cityUser" required/>
                            </div>
                        </div>
                    </div>

                    <h4 class="tt-label mb-3 border-bottom pb-2">Physiologie</h4>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:30px;">
                        <div class="form-group mb-0">
                            <label class="form-label" for="ageUser">&#xc2;ge <span class="required">*</span></label>
                            <input type="number" class="form-control" th:value="${user.getAge()}" placeholder="Entrez votre age" name="age" id="ageUser" required/>
                        </div>
                        <div class="form-group mb-0">
                            <label class="form-label" for="gender-select">Sexe <span class="required">*</span></label>
                            <select class="form-select" name="gender" id="gender-select" required>
                                <option value="">--Choisissez votre sexe--</option>
                                <option value="MALE" th:if="${user.gender != null and user.gender.name() == 'MALE'}" selected>Homme (M)</option>
                                <option value="MALE" th:unless="${user.gender != null and user.gender.name() == 'MALE'}">Homme (M)</option>
                                <option value="FEMALE" th:if="${user.gender != null and user.gender.name() == 'FEMALE'}" selected>Femme (F)</option>
                                <option value="FEMALE" th:unless="${user.gender != null and user.gender.name() == 'FEMALE'}">Femme (F)</option>
                            </select>
                        </div>
                        <div class="form-group mb-0">
                            <label class="form-label" for="heightUser">Taille (m) <span class="required">*</span></label>
                            <div class="input-icon-wrap">
                                <i class="bi bi-rulers input-icon"></i>
                                <input type="number" step="0.01" class="form-control" th:value="${user.getHeight()}" placeholder="Entrez votre taille" name="height" id="heightUser" required/>
                            </div>
                        </div>
                        <div class="form-group mb-0">
                            <label class="form-label" for="weightUser">Poids (kg) <span class="required">*</span></label>
                            <div class="input-icon-wrap">
                                <i class="bi bi-speedometer input-icon"></i>
                                <input type="number" step="0.01" class="form-control" th:value="${user.getWeight()}" placeholder="Entrez votre poids" name="weight" id="weightUser" required/>
                            </div>
                        </div>
                    </div>

                    <h4 class="tt-label mb-3 border-bottom pb-2">S&#xe9;curit&#xe9;</h4>
                    <div class="form-group" style="max-width:50%;">
                        <label class="form-label" for="passwordUser">Nouveau mot de passe <span class="text-muted text-lowercase fw-normal">(laisser vide pour ne pas modifier)</span></label>
                        <div class="input-icon-wrap">
                            <i class="bi bi-lock input-icon"></i>
                            <input type="password" class="form-control" placeholder="Nouveau mot de passe" name="password" id="passwordUser"/>
                        </div>
                    </div>

                    <div class="divider"></div>
                    <div class="d-flex justify-content-end">
                        <button type="submit" class="btn-tt btn-primary"><i class="bi bi-save"></i> Enregistrer les modifications</button>
                    </div>

                </form>
            </div>
        </section>
    </main>
</div>

<!-- Formulaire de suppression de photo hors du formulaire principal -->
<form th:if="${user.profileImage != null}" id="deleteImageForm"
      action="/users/deleteProfileImage" method="POST" style="display:none;"></form>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('profileImageInput').addEventListener('change', function () {
        const file = this.files[0];
        if (file) { document.getElementById('imagePreview').src = URL.createObjectURL(file); }
    });
</script>
</body>
</html>
