<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TranspiTrack — Préférences sportives</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <th:block th:replace="~{fragments/sidebar :: sidebar-styles}"></th:block>
    <th:block th:replace="~{fragments/notifications :: notif-styles}"></th:block>
</head>
<body>

<div class="layout">

    <nav th:replace="~{fragments/sidebar :: sidebar-nav(activePage='preferences')}"></nav>

    <main class="main">

        <div class="page-header">
            <h1>Mes sports préférés</h1>
            <p>Gérez votre niveau pour chaque discipline.</p>
        </div>

        <section class="section">
            <table class="table-tt mb-5">
                <thead>
                    <tr>
                        <th>Sport</th>
                        <th>Niveau</th>
                        <th style="width: 100px; text-align: center;">Supprimer</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="sp : ${sportsPreference}">
                        <td class="fw-700">
                            <span class="badge-tt badge-secondary" th:text="${sp.sport.name}">Sport</span>
                        </td>
                        <td>
                            <form th:action="@{/users/updateLevel}" method="post" class="d-flex align-items-center gap-8 m-0">
                                <input type="hidden" name="userSport" th:value="${sp.id}" />
                                <select name="level" class="form-select form-select-sm" style="width: auto; padding: 4px 30px 4px 10px;" required>
                                    <option value="BEGINNER" th:selected="${sp.level.name() == 'BEGINNER'}">Débutant</option>
                                    <option value="AMATEUR" th:selected="${sp.level.name() == 'AMATEUR'}">Amateur</option>
                                    <option value="INTERMEDIATE" th:selected="${sp.level.name() == 'INTERMEDIATE'}">Intermédiaire</option>
                                    <option value="ADVANCED" th:selected="${sp.level.name() == 'ADVANCED'}">Avancé</option>
                                    <option value="PROFESSIONAL" th:selected="${sp.level.name() == 'PROFESSIONAL'}">Professionnel</option>
                                </select>
                                <button type="submit" class="btn-tt btn-outline-primary btn-sm"><i class="bi bi-save"></i> Mettre à jour</button>
                            </form>
                        </td>
                        <td style="text-align: center;">
                            <form th:action="@{/users/deletePreference}" method="post" class="m-0">
                                <input type="hidden" name="userSport" th:value="${sp.id}" />
                                <button type="submit" class="btn-tt btn-ghost btn-icon btn-sm text-danger"><i class="bi bi-trash"></i></button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${sportsPreference == null or sportsPreference.isEmpty()}">
                        <td colspan="3" class="text-center p-4 text-muted-tt">Aucune préférence sportive renseignée.</td>
                    </tr>
                </tbody>
            </table>

            <div class="form-card" style="max-width: 500px;">
                <h4 class="tt-label mb-3">Ajouter une préférence sportive</h4>
                <form th:action="@{/users/addPreference}" method="post">
                    
                    <div class="form-group">
                        <label class="form-label">Sport <span class="required">*</span></label>
                        <select name="sport" class="form-select" required>
                            <option value="" disabled selected>-- Choisir un sport --</option>
                            <option th:each="sport : ${sports}" th:value="${sport.id}" th:text="${sport.name}"></option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Niveau <span class="required">*</span></label>
                        <select name="level" class="form-select" required>
                            <option value="BEGINNER">Débutant (Beginner)</option>
                            <option value="AMATEUR">Amateur</option>
                            <option value="INTERMEDIATE">Intermédiaire</option>
                            <option value="ADVANCED">Avancé (Advanced)</option>
                            <option value="PROFESSIONAL">Professionnel</option>
                        </select>
                    </div>

                    <div class="d-flex justify-content-end mt-3">
                        <button type="submit" class="btn-tt btn-primary"><i class="bi bi-plus-lg"></i> Ajouter</button>
                    </div>
                </form>
            </div>
        </section>

    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<th:block th:replace="~{fragments/notifications :: notif-container}"></th:block>
</body>
</html>
