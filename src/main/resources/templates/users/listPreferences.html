<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Profil utilisateur</title>
</head>
<body> 
<p th:text = "${message}"></p>
<table border="1">
    <thead>
    <tr>
        <th>Sport</th>
        <th>Niveau</th>
        <th>Modifier</th>
        <th>Supprimer</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="sp : ${sportsPreference}">
        
        <!-- Sport -->
        <td th:text="${sp.sport.name}">Sport</td>

        <!-- Niveau modifiable -->
        <td>
            <form th:action="@{/users/updateLevel}" method="post">
                <input type="hidden" name="userSport" th:value="${sp.id}" />
                <select name="level" id="level-select" required>
                    <option value="BEGINNER" th:selected="${sp.level.name() == 'BEGINNER'}">Beginner</option>
                    <option value="AMATEUR" th:selected="${sp.level.name() == 'AMATEUR'}">Amateur</option>
                    <option value="INTERMEDIATE" th:selected="${sp.level.name() == 'INTERMEDIATE'}">Intermediate</option>
                    <option value="ADVANCED" th:selected="${sp.level.name() == 'ADVANCED'}">Advanced</option>
                    <option value="PROFESSIONAL" th:selected="${sp.level.name() == 'PROFESSIONAL'}">Professional</option>
                </select>
        </td>

        <!-- Modifier -->
        <td>
                <button type="submit">Modifier</button>
            </form>
        </td>

        <!-- Supprimer -->
        <td>
            <form th:action="@{/users/deletePreference}" method="post">
                <input type="hidden" name="userSport" th:value="${sp.id}" />
                <button type="submit">Supprimer</button>
            </form>
        </td>

    </tr>
    </tbody>
</table><br><br><br>

<h3>Ajouter une préférence sportive</h3>

<form th:action="@{/users/addPreference}" method="post">

    <!-- Choix du sport -->
    <label>Sport :</label>
    <select name="sport" required>
        <option value="">-- Choisir un sport --</option>
        <option th:each="sport : ${sports}"
                th:value="${sport.id}"
                th:text="${sport.name}">
        </option>
    </select>

    <br><br>

    <!-- Choix du niveau -->
    <label>Niveau :</label>
    <select name="level" required>
        <option value="BEGINNER">Beginner</option>
        <option value="AMATEUR">Amateur</option>
        <option value="INTERMEDIATE">Intermediate</option>
        <option value="ADVANCED">Advanced</option>
        <option value="PROFESSIONAL">Professional</option>
    </select>

    <br><br>

    <button type="submit">Ajouter</button>

</form>
</body>
</html>
