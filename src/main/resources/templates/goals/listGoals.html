<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TranspiTrack — Mes Objectifs</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <th:block th:replace="~{fragments/sidebar :: sidebar-styles}"></th:block>
    <th:block th:replace="~{fragments/notifications :: notif-styles}"></th:block>
</head>
<body>

<div class="layout">

    <nav th:replace="~{fragments/sidebar :: sidebar-nav(activePage='goals')}"></nav>

    <main class="main">

        <div class="page-header">
            <h1>Mes Objectifs</h1>
            <p>Fixez-vous des buts à atteindre et suivez votre progression.</p>
        </div>

        <section class="section">
            
            <table class="table-tt mb-5">
                <thead>
                    <tr>
                        <th>Description de l'objectif</th>
                        <th style="width: 200px;">Distance à réaliser (km)</th>
                        <th style="width: 150px;">Sport</th>
                        <th style="width: 150px;">Temporalité</th>
                        <th style="width: 120px; text-align: center;">Modifier</th>
                        <th style="width: 100px; text-align: center;">Supprimer</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="g : ${goals}">

                        <td style="display:none;">
                            <form th:action="@{/users/updateGoal}" method="post" th:id="'updateForm-' + ${g.id}"></form>
                        </td>

                        <td>
                            <input type="hidden" name="goalId" th:value="${g.id}" th:attr="form='updateForm-' + ${g.id}" />
                            <input type="text" class="form-control form-control-sm" th:value="${g.goalText}" placeholder="Ex: Courir mon premier marathon" name="goal" required th:attr="form='updateForm-' + ${g.id}" />
                        </td>

                        <td>
                            <div class="input-icon-wrap">
                                <i class="bi bi-speedometer2 input-icon" style="font-size: 0.85rem;"></i>
                                <input type="number" class="form-control form-control-sm" th:value="${g.targetDistance}" step="0.01" placeholder="Distance" name="targetDistance" required th:attr="form='updateForm-' + ${g.id}" />
                            </div>
                        </td>

                        <td>
                            <select class="form-select form-select-sm" name="sportId" required th:attr="form='updateForm-' + ${g.id}">
                                <option th:each="s : ${sports}" th:value="${s.id}" th:text="${s.name}" th:selected="${g.sport?.id == s.id}"></option>
                            </select>
                        </td>

                        <td>
                            <select class="form-select form-select-sm" name="temporality" required th:attr="form='updateForm-' + ${g.id}">
                                <option th:each="temp : ${temporalities}" th:value="${temp}" th:text="${temp}" th:selected="${g.temporality == temp}"></option>
                            </select>
                        </td>

                        <td style="text-align: center;">
                            <button type="submit" class="btn-tt btn-outline-primary btn-sm" th:attr="form='updateForm-' + ${g.id}">
                                <i class="bi bi-save"></i> Modifier
                            </button>
                        </td>

                        <td style="text-align: center;">
                            <form th:action="@{/users/deleteGoal}" method="post">
                                <input type="hidden" name="goalId" th:value="${g.id}" />
                                <button type="submit" class="btn-tt btn-ghost btn-icon btn-sm text-danger"><i class="bi bi-trash"></i></button>
                            </form>
                        </td>

                    </tr>

                    <tr th:if="${goals == null or goals.isEmpty()}">
                        <td colspan="4" class="text-center p-4">
                            <div class="empty-state" style="box-shadow: none; background: transparent; padding: 20px;">
                                <div class="empty-state-icon">🎯</div>
                                <div class="empty-state-title">Aucun objectif défini</div>
                                <div class="empty-state-desc">Commencez par ajouter votre premier objectif ci-dessous.</div>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>

            <div class="form-card" style="max-width: 600px;">
                <h4 class="tt-label mb-3"><i class="bi bi-plus-circle text-primary"></i> Ajouter un nouvel objectif</h4>
                
                <form th:action="@{/users/addGoal}" method="post">
                    
                    <div class="form-group">
                        <label class="form-label" for="goalUser">Description de l'objectif <span class="required">*</span></label>
                        <input type="text" class="form-control" placeholder="Ex: Atteindre les 100km en vélo ce mois-ci" name="goal" id="goalUser" required/>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="distanceUser">Distance cible (km) <span class="required">*</span></label>
                        <div class="input-icon-wrap">
                            <i class="bi bi-geo-alt input-icon"></i>
                            <input type="number" class="form-control" step="0.01" placeholder="Ex: 100" name="targetDistance" id="distanceUser" required/>
                        </div>
                    </div>

                    <div class="form-group mt-3">
                        <label class="form-label" for="sportId">Sport <span class="required">*</span></label>
                        <select class="form-select" name="sportId" id="sportId" required>
                            <option value="" disabled selected>Choisir un sport...</option>
                            <option th:each="s : ${sports}" th:value="${s.id}" th:text="${s.name}"></option>
                        </select>
                    </div>

                    <div class="form-group mt-3">
                        <label class="form-label" for="temporality">Temporalité <span class="required">*</span></label>
                        <select class="form-select" name="temporality" id="temporality" required>
                            <option value="" disabled selected>Choisir une fréquence...</option>
                            <option th:each="temp : ${temporalities}" th:value="${temp}" th:text="${temp}"></option>
                        </select>
                    </div>

                    <div class="d-flex justify-content-end mt-4">
                        <button type="submit" class="btn-tt btn-primary">
                            <i class="bi bi-flag-fill"></i> Ajouter l'objectif
                        </button>
                    </div>

                </form>
            </div>
        </section>

    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<th:block th:replace="~{fragments/notifications :: notif-container}"></th:block>
</body>
</html>
