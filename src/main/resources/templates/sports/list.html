<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TranspiTrack — Liste des Sports</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>

<div class="layout">

    <nav class="sidebar">
        <div class="sidebar-logo">
            <div class="sidebar-logo-icon">🏃</div>
            <div>
                <div class="sidebar-logo-text">TranspiTrack</div>
            </div>
        </div>

        <span class="sidebar-section-label">Menu</span>
        <a th:href="@{/activities}"><i class="bi bi-card-list"></i> Mes Activités</a>
        <a th:href="@{/dashboard}"><i class="bi bi-graph-up"></i> Tableau de bord</a>
        
        <span class="sidebar-section-label mt-3">Administration</span>
        <a th:href="@{/sports}" class="active"><i class="bi bi-list-ul"></i> Liste des sports</a>
        <a th:href="@{/sports/add}"><i class="bi bi-plus-circle"></i> Ajouter un sport</a>
    </nav>

    <main class="main">

        <div class="page-header">
            <h1>Catalogue des sports</h1>
            <p>Consultez les disciplines sportives disponibles dans l'application.</p>
        </div>

        <section class="section">
            <table class="table-tt">
                <thead>
                    <tr>
                        <th>Nom du sport</th>
                        <th>Type / Catégorie</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="sport : ${sports}">
                        <td class="fw-700">
                            <div class="d-flex ai-center">
                                <span class="table-sport-icon" style="background:var(--primary-bg)">🏅</span>
                                <span th:text="${sport.name}">Nom du Sport</span>
                            </div>
                        </td>
                        <td>
                            <span class="badge-tt badge-secondary" th:if="${sport.sportType != null}" th:text="${sport.sportType.name}">Sport Type</span>
                            <span th:if="${sport.sportType == null}" class="text-muted-tt" style="font-size: 0.85rem;">Non défini</span>
                        </td>
                    </tr>
                    
                    <tr th:if="${sports == null or sports.isEmpty()}">
                        <td colspan="2" class="text-center p-4">
                            <div class="empty-state" style="box-shadow: none; background: transparent; padding: 20px;">
                                <div class="empty-state-icon">📭</div>
                                <div class="empty-state-title">Aucun sport enregistré</div>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </section>

    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
