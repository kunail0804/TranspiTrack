<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TranspiTrack — Ajouter un Sport</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>

<div class="layout">

    <nav class="sidebar">
        <div class="sidebar-logo">
            <div class="sidebar-logo-icon">🏃</div>
            <div>
                <div class="sidebar-logo-text">TranspiTrack</div>
            </div>
        </div>

        <span class="sidebar-section-label">Menu</span>
        <a th:href="@{/activities}"><i class="bi bi-card-list"></i> Mes Activités</a>
        <a th:href="@{/dashboard}"><i class="bi bi-graph-up"></i> Tableau de bord</a>
        
        <span class="sidebar-section-label mt-3">Administration</span>
        <a th:href="@{/sports}"><i class="bi bi-list-ul"></i> Liste des sports</a>
        <a th:href="@{/sports/add}" class="active"><i class="bi bi-plus-circle"></i> Ajouter un sport</a>
    </nav>

    <main class="main">

        <div class="page-header">
            <h1>Ajouter un sport</h1>
            <p>Enrichissez la base de données avec une nouvelle discipline sportive.</p>
        </div>

        <section class="section">
            <div class="form-card" style="max-width: 600px;">
                <form th:action="@{/sports/add}" th:object="${sport}" method="post">
                    
                    <div class="form-group">
                        <label class="form-label" for="name">Nom du sport <span class="required">*</span></label>
                        <input type="text" id="name" class="form-control" th:field="*{name}" placeholder="Ex: Basket-ball" required />
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="sportType">Type / Catégorie <span class="required">*</span></label>
                        <select id="sportType" class="form-select" th:field="*{sportType}" required>
                            <option value="" disabled selected>— Choisir un type —</option>
                            <option th:each="type : ${sportTypes}" th:value="${type.id}" th:text="${type.name}">Sport Type</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="metValue">Valeur MET (Intensité métabolique) <span class="required">*</span></label>
                        <div class="input-icon-wrap">
                            <i class="bi bi-activity input-icon"></i>
                            <input type="number" id="metValue" class="form-control" th:field="*{metValue}" step="0.1" min="0" placeholder="Ex: 8.0" required />
                        </div>
                        <div class="form-hint">Le MET est utilisé pour calculer les calories dépensées avec précision.</div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="description">Description</label>
                        <textarea id="description" class="form-control" th:field="*{description}" rows="3" placeholder="Brève description de la discipline..."></textarea>
                    </div>

                    <div class="divider"></div>

                    <div class="d-flex justify-content-end">
                        <button type="submit" class="btn-tt btn-primary">
                            <i class="bi bi-check-lg"></i> Ajouter le sport
                        </button>
                    </div>

                </form>
            </div>
        </section>

    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
