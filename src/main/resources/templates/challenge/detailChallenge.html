<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Détails du Challenge</title>
</head>
<body>
    <div>
        <h1>Détails du Challenge</h1>
        
        <div>
            <h2 th:text="${challenge.title}">Titre du Challenge</h2>
            
            <ul>
                <li><strong>Durée : </strong> <span th:text="${challenge.duration?.toDays()}">0</span> jours</li>
                <li><strong>Sport : </strong> <span th:text="${challenge.sport?.name}">Nom du sport</span></li>
                <li><strong>Visibilité : </strong> <span th:text="${challenge.visibility}">Public/Privé</span></li>
                <li><strong>Créé par : </strong> <span th:text="|${challenge.creator?.firstName} ${challenge.creator?.name}|">Prénom Nom</span></li>
            </ul>

            <br>
            <a th:href="@{/challenges/list}" class="btn btn-secondary">Retour à la liste</a>
        </div>

        <div th:if="${canAddScore and userScore == null}">
            <h3>Ajouter un score</h3>
            <form th:action="@{/challenges/details/{id}/addScore(id=${challenge.id})}" method="post">
                <label for="score">Score :</label>
                <input type="number" id="score" name="score" step="0.01" required />
                <button type="submit">Valider</button>
            </form>
        </div>

        <div th:if="${canAddScore and userScore != null}">
            <h3>Modifier mon score</h3>
            <p>Score actuel : <span th:text="${userScore.score}">0</span></p>
            <form th:action="@{/challenges/details/{id}/addScore(id=${challenge.id})}" method="post">
                <label for="score-edit">Nouveau score :</label>
                <input type="number" id="score-edit" name="score" step="0.01" th:value="${userScore.score}" required />
                <button type="submit">Modifier</button>
            </form>
        </div>

        <div>
            <h3>Scores enregistrés</h3>
            <ul th:if="${scores != null and !scores.isEmpty()}">
                <li th:each="s : ${scores}">
                    <span th:text="|${s.user.firstName} ${s.user.name}|">Prénom Nom</span>
                    :
                    <span th:text="${s.score}">0</span>
                </li>
            </ul>
            <p th:if="${scores == null or scores.isEmpty()}">Aucun score pour l'instant.</p>
        </div>
    </div>
</body>
</html>
