<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TranspiTrack — Créer un Challenge</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>

<div class="layout">

    <nav class="sidebar">
        <div class="sidebar-logo">
            <div class="sidebar-logo-icon">🏃</div>
            <div><div class="sidebar-logo-text">TranspiTrack</div></div>
        </div>
        <span class="sidebar-section-label">Menu</span>
        <a th:href="@{/activities}"><i class="bi bi-card-list"></i> Mes Activités</a>
        <a th:href="@{/dashboard}"><i class="bi bi-graph-up"></i> Tableau de bord</a>
        
        <span class="sidebar-section-label mt-3">Challenges</span>
        <a th:href="@{/challenges/list}"><i class="bi bi-compass"></i> Explorer</a>
        <a th:href="@{/challenges/formCreate}" class="active"><i class="bi bi-plus-circle"></i> Créer un challenge</a>
    </nav>

    <main class="main">
        <div class="page-header">
            <h1>Créer un nouveau Challenge</h1>
            <p>Lancez un défi à vos amis ou à toute la communauté !</p>
        </div>

        <section class="section">
            <div class="form-card" style="max-width: 600px;">
                <form action="/challenges/create" method="POST">
                    
                    <div class="form-group">
                        <label class="form-label" for="title">Intitulé du challenge <span class="required">*</span></label>
                        <div class="input-icon-wrap">
                            <i class="bi bi-trophy input-icon"></i>
                            <input type="text" id="title" name="title" class="form-control" required placeholder="Ex: Courir 10km..." />
                        </div>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                        <div class="form-group">
                            <label class="form-label" for="sport">Sport concerné <span class="required">*</span></label>
                            <select name="sportId" id="sport" class="form-select" required>
                                <option value="" disabled selected>-- Choisir un sport --</option>
                                <option th:each="s : ${sports}" th:value="${s.id}" th:text="${s.name}">Nom du Sport</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="durationDays">Durée (jours) <span class="required">*</span></label>
                            <div class="input-icon-wrap">
                                <i class="bi bi-calendar-event input-icon"></i>
                                <input type="number" id="durationDays" name="durationDays" class="form-control" required min="1" placeholder="Ex: 7" />
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="visibility">Statut de visibilité <span class="required">*</span></label>
                        <select id="visibility" name="visibility" class="form-select" required>
                            <option value="AMIS">🔒 Visible uniquement par mes amis</option>
                            <option value="PUBLIC">🌍 Public (Tout le monde)</option>
                        </select>
                    </div>

                    <div class="divider"></div>

                    <div class="d-flex justify-content-end gap-12">
                        <a th:href="@{/users/dashboard}" class="btn-tt btn-ghost">Annuler</a>
                        <button type="submit" class="btn-tt btn-primary">
                            <i class="bi bi-rocket-takeoff"></i> Lancer le challenge !
                        </button>
                    </div>

                </form>
            </div>
        </section>

    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
