<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TranspiTrack — Mes Challenges Actifs</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <th:block th:replace="~{fragments/sidebar :: sidebar-styles}"></th:block>
</head>
<body>

<div class="layout">

    <nav th:replace="~{fragments/sidebar :: sidebar-nav(activePage='challenges')}"></nav>

    <main class="main">
        <div class="page-header d-flex align-items-center justify-content-between">
            <div>
                <h1>Mes Challenges en cours</h1>
                <p>Suivez l'évolution des défis auxquels vous participez.</p>
            </div>
            <a th:href="@{/challenges/list}" class="btn-tt btn-outline-secondary">
                <i class="bi bi-search"></i> Trouver des défis
            </a>
        </div>

        <section class="section">
            
            <div class="empty-state p-5" th:if="${#lists.isEmpty(user.joinedChallenges)}">
                <div class="empty-state-icon">🛋️</div>
                <div class="empty-state-title">Aucun défi en cours</div>
                <div class="empty-state-desc">Vous ne participez à aucun challenge actuellement.</div>
                <a th:href="@{/challenges/list}" class="btn-tt btn-primary mt-3"><i class="bi bi-compass"></i> Explorer les challenges</a>
            </div>

            <div class="cards-grid-2" th:if="${not #lists.isEmpty(user.joinedChallenges)}">
                <div class="card-tt challenge-card" th:each="challenge : ${user.joinedChallenges}">
                    <div class="challenge-card-header">
                        <div class="challenge-card-title" th:text="${challenge.title}">Titre du challenge</div>
                        <div class="challenge-card-sub">
                            Créé par <span th:text="|${challenge.creator?.firstName} ${challenge.creator?.name}|">Prénom Nom</span>
                        </div>
                    </div>
                    <div class="challenge-card-body">
                        <div class="badges-row mb-3">
                            <span class="badge-tt badge-secondary"><i class="bi bi-activity"></i> <span th:text="${challenge.sport?.name}">Sport</span></span>
                            <span class="badge-tt badge-warning"><i class="bi bi-clock"></i> <span th:text="${challenge.duration.toDays()}">0</span> jrs</span>
                            <span class="badge-tt badge-info" th:text="${challenge.visibility}">Privé/Public</span>
                        </div>
                        <a th:href="@{/challenges/details/{id}(id=${challenge.id})}" class="btn-tt btn-outline-primary w-100 justify-content-center btn-sm">
                            Mettre à jour mon score
                        </a>
                    </div>
                </div>
            </div>

        </section>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
