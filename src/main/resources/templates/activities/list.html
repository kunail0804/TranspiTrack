<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TranspiTrack — Mes Activités</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <th:block th:replace="~{fragments/sidebar :: sidebar-styles}"></th:block>
    <th:block th:replace="~{fragments/notifications :: notif-styles}"></th:block>
    <style>
        .activity-details { display: none; background-color: var(--bg); }
        .activity-details.open { display: table-row; }
        .activity-details td { padding: 16px 24px !important; border-bottom: 2px solid var(--border) !important; }
    </style>
</head>
<body>

<div class="layout">

    <nav th:replace="~{fragments/sidebar :: sidebar-nav(activePage='activities')}"></nav>

    <main class="main">

        <div class="page-header">
            <h1>Mes Activités</h1>
            <p>Retrouvez l'historique complet de vos sessions sportives.</p>
        </div>

        <section class="section">
            <div class="mb-4">
                <a th:href="@{/activities/add}" class="btn-tt btn-primary">
                    <i class="bi bi-plus-lg"></i> Nouvelle activité
                </a>
            </div>
            <table class="table-tt">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Sport</th>
                        <th>Distance (km)</th>
                        <th style="width: 60px; text-align: center;"></th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${activities == null or activities.isEmpty()}">
                        <td colspan="4" class="text-center" style="padding: 32px;">
                            <div class="empty-state" style="box-shadow: none; background: transparent;">
                                <div class="empty-state-icon">📭</div>
                                <div class="empty-state-title">Aucune activité</div>
                                <div class="empty-state-desc">Vous n'avez pas encore enregistré d'activité.</div>
                            </div>
                        </td>
                    </tr>
                    <th:block th:each="activity, stat : ${activities}">
                        <tr>
                            <td class="fw-700" th:text="${activity.date}">2023-01-01</td>
                            <td>
                                <div class="d-flex ai-center">
                                    <span class="table-sport-icon" style="background:var(--primary-bg)">🏃</span>
                                    <span th:text="${activity.sport.name}">Nom du Sport</span>
                                </div>
                            </td>
                            <td class="fw-700 text-primary" th:text="${activity.distance}">0.0</td>
                            <td style="text-align: center;">
                                <button class="btn-tt btn-ghost btn-icon btn-sm"
                                        th:data-target="|act-details-${stat.index}|"
                                        onclick="toggleDetails(this)">
                                    ▼
                                </button>
                            </td>
                        </tr>
                        <tr class="activity-details" th:id="|act-details-${stat.index}|">
                            <td colspan="4">
                                <strong>Durée :</strong>
                                <span th:text="${activity.duration}"></span> min &nbsp;|&nbsp;
                                <strong>Évaluation :</strong>
                                <span th:text="${activity.evaluation}"></span> &nbsp;|&nbsp;
                                <strong>Calories :</strong>
                                <span th:text="${#numbers.formatDecimal(activity.getTotalCaloriesAct(), 1, 1)}"></span> kcal
                                <div th:if="${activity.city != null and activity.city != ''}" style="margin-top: 8px; color: var(--info); background: var(--info-bg); padding: 6px 12px; border-radius: var(--radius-sm); display: inline-block; font-size: 0.85rem;">
                                    📍 <strong th:text="${activity.city}">Ville</strong> &nbsp;|&nbsp;
                                    🌤️ <strong>Météo :</strong>
                                    <span th:text="${activity.temperature != null ? activity.temperature + '°C' : 'N/A'}"></span> -
                                    <span th:text="${activity.weatherCondition != null ? activity.weatherCondition : 'Non disponible'}"></span>
                                </div>
                                <div style="margin-top: 10px;">
                                    <a th:href="@{/activities/details/{id}(id=${activity.id})}" class="btn-tt btn-outline-primary btn-sm">
                                        <i class="bi bi-chat-dots"></i> Commentaires
                                    </a>
                                </div>
                            </td>
                        </tr>
                    </th:block>
                </tbody>
            </table>
        </section>

    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function toggleDetails(btn) {
        const row = document.getElementById(btn.dataset.target);
        row.classList.toggle('open');
        btn.textContent = row.classList.contains('open') ? '▲' : '▼';
    }
</script>
<th:block th:replace="~{fragments/notifications :: notif-container}"></th:block>

</body>
</html>
