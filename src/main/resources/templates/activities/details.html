<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TranspiTrack — Détails de l'activité</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <th:block th:replace="~{fragments/sidebar :: sidebar-styles}"></th:block>
    <th:block th:replace="~{fragments/notifications :: notif-styles}"></th:block>
</head>
<body>

<div class="layout">

    <nav th:replace="~{fragments/sidebar :: sidebar-nav(activePage='activities')}"></nav>

    <main class="main">

        <div class="page-header d-flex" style="justify-content: space-between; align-items: flex-start;">
            <div>
                <h1>Détails de l'activité</h1>
                <p>
                    Réalisée par <strong class="text-primary" th:text="${author.firstName} + ' ' + ${author.name}">Nom Prénom</strong>
                    le <span th:text="${activity.date}">Date</span>
                </p>
            </div>
            <span class="badge-tt badge-primary" style="font-size: 1rem; padding: 8px 16px;">
                <i class="bi bi-trophy"></i> <span th:text="${activity.sport.name}">Sport</span>
            </span>
        </div>

        <section class="section">
            <div class="cards-grid">
                <div class="card-tt stat-card">
                    <div class="stat-card-header">
                        <div>
                            <div class="stat-card-label">Distance</div>
                            <div class="stat-card-value"><span th:text="${activity.distance}">0</span> <small style="font-size:1rem;font-weight:500;color:var(--text-muted)">km</small></div>
                        </div>
                        <div class="stat-card-icon" style="background:var(--primary-bg); color:var(--primary)"><i class="bi bi-speedometer2"></i></div>
                    </div>
                </div>

                <div class="card-tt stat-card">
                    <div class="stat-card-header">
                        <div>
                            <div class="stat-card-label">Durée</div>
                            <div class="stat-card-value"><span th:text="${activity.duration}">0</span> <small style="font-size:1rem;font-weight:500;color:var(--text-muted)">min</small></div>
                        </div>
                        <div class="stat-card-icon" style="background:var(--info-bg); color:var(--info)"><i class="bi bi-clock"></i></div>
                    </div>
                </div>
            </div>

            <div class="card-tt mt-4 p-4" th:if="${activity.evaluation != null and !activity.evaluation.isEmpty()}">
                <h4 class="tt-label mb-2"><i class="bi bi-chat-left-quote text-primary"></i> Évaluation de la séance</h4>
                <p class="tt-body mb-0" th:text="${activity.evaluation}">Super séance, un peu difficile sur la fin.</p>
            </div>
        </section>

        <div class="divider"></div>

        <section class="section">
            <h2 class="section-title"><i class="bi bi-chat-dots"></i> Commentaires</h2>

            <div class="d-flex flex-column gap-16 mb-4">
                <div class="card-tt p-3" th:each="commentary : ${commentaries}">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <div class="fw-700" th:text="${commentary.author.firstName} + ' ' + ${commentary.author.name}">Auteur</div>
                        <span class="badge-tt badge-secondary" th:if="${commentary.reaction != null}" th:text="${commentary.reaction.emoji}">👍</span>
                    </div>
                    <p class="tt-body text-muted-tt mb-3" th:text="${commentary.message}">Message du commentaire.</p>

                    <form th:action="@{/activities/comment/{id}/reaction(id=${commentary.id})}" method="post" 
                          th:if="${user != null and commentary.author != null and user.id == commentary.author.id}"
                          class="d-flex gap-8">
                        <button type="submit" name="reaction" value="LIKE" class="btn-tt btn-outline-secondary btn-sm">👍</button>
                        <button type="submit" name="reaction" value="LOVE" class="btn-tt btn-outline-secondary btn-sm">❤️</button>
                        <button type="submit" name="reaction" value="WOW" class="btn-tt btn-outline-secondary btn-sm">😮</button>
                        <button type="submit" name="reaction" value="DISLIKE" class="btn-tt btn-outline-secondary btn-sm">👎</button>
                    </form>
                </div>

                <div class="empty-state" th:if="${commentaries == null or commentaries.isEmpty()}">
                    <div class="empty-state-icon">💬</div>
                    <div class="empty-state-title">Aucun commentaire</div>
                    <div class="empty-state-desc">Soyez le premier à réagir à cette activité !</div>
                </div>
            </div>

            <div class="form-card" th:if="${!user.equals(author) and canComment}">
                <h4 class="tt-label mb-3">Laisser un commentaire</h4>
                <form th:action="@{/activities/comment/{id}(id=${activity.id})}" method="post" th:object="${commentary}">
                    
                    <div class="form-group">
                        <label class="form-label" for="message">Votre message <span class="required">*</span></label>
                        <textarea id="message" class="form-control" rows="3" required th:field="*{message}" placeholder="Super perf !"></textarea>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="emoji">Ajouter un emoji</label>
                        <select id="emoji" class="form-select" th:field="*{reaction}">
                            <option value="">— Aucun —</option>
                            <option value="LIKE">👍 J'aime</option>
                            <option value="LOVE">❤️ J'adore</option>
                            <option value="WOW">😮 Wouah</option>
                            <option value="DISLIKE">👎 Bof</option>
                        </select>
                    </div>

                    <div class="d-flex justify-content-end">
                        <button type="submit" class="btn-tt btn-primary">
                            <i class="bi bi-send"></i> Publier
                        </button>
                    </div>
                </form>
            </div>
        </section>

    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<th:block th:replace="~{fragments/notifications :: notif-container}"></th:block>

</body>
</html>
