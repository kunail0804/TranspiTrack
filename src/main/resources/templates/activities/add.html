<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TranspiTrack — Ajouter Activité</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

    <link rel="stylesheet" th:href="@{/css/style.css}" />
    
</head>
<body>

<div class="layout">

    <nav class="sidebar">
        <div class="sidebar-logo">
            <div class="sidebar-logo-icon">🏃</div>
            <div>
                <div class="sidebar-logo-text">TranspiTrack</div>
            </div>
        </div>

        <span class="sidebar-section-label">Menu</span>
        <a th:href="@{/activities}"><i class="bi bi-card-list"></i> Mes Activités</a>
        <a th:href="@{/activities/add}" class="active"><i class="bi bi-plus-circle"></i> Nouvelle Activité</a>
        <a th:href="@{/dashboard}"><i class="bi bi-graph-up"></i> Tableau de bord</a>
    </nav>

    <main class="main">

        <div class="page-header">
            <h1>Ajouter une activité</h1>
            <p>Enregistrez vos performances et suivez votre progression.</p>
        </div>

        <section class="section">
            <div class="form-card" style="max-width: 800px;">
                
                <div class="alert-tt alert-danger" th:if="${error}">
                    <i class="bi bi-x-circle-fill alert-tt-icon"></i>
                    <div class="alert-tt-content">
                        <div class="title">Action impossible</div>
                        <div class="desc" th:text="${error}">Message d'erreur</div>
                    </div>
                    <i class="bi bi-x-lg alert-tt-close" onclick="this.closest('.alert-tt').remove()"></i>
                </div>

                <form th:action="@{/activities/add}" th:object="${activity}" method="post">
                    
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                        
                        <div class="form-group">
                            <label class="form-label" for="sport">Sport <span class="required">*</span></label>
                            <select id="sport" class="form-select" th:field="*{sport}" required>
                                <option value="" disabled selected>— Choisir un sport —</option>
                                <option th:each="sport : ${sports}" th:value="${sport.id}" th:text="${sport.name}">Sport Name</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="date">Date de l'activité <span class="required">*</span></label>
                            <div class="input-icon-wrap">
                                <i class="bi bi-calendar3 input-icon"></i>
                                <input type="date" id="date" class="form-control" th:field="*{date}" required />
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="duration">Durée (minutes) <span class="required">*</span></label>
                            <div class="input-icon-wrap">
                                <i class="bi bi-clock input-icon"></i>
                                <input type="number" id="duration" class="form-control" th:field="*{duration}" placeholder="ex: 45" required />
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="distance">Distance (km) <span class="required">*</span></label>
                            <div class="input-icon-wrap">
                                <i class="bi bi-speedometer2 input-icon"></i>
                                <input type="number" step="0.01" id="distance" class="form-control" th:field="*{distance}" placeholder="0.00" required />
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="city">Ville de l'activité <span class="required">*</span></label>
                            <div class="input-icon-wrap">
                                <i class="bi bi-geo-alt input-icon"></i>
                                <input type="text" id="city" class="form-control" th:field="*{city}" placeholder="ex: Paris" required />
                            </div>
                        </div>

                        <div class="form-group" style="grid-column: 1 / -1;">
                            <label class="form-label" for="evaluation">Évaluation / Notes</label>
                            <input type="text" id="evaluation" class="form-control" th:field="*{evaluation}" placeholder="Comment s'est passée cette activité ?" />
                        </div>
                    </div>

                    <div class="divider"></div>

                    <div class="d-flex ai-center gap-12" style="justify-content: flex-end;">
                        <a th:href="@{/activities}" class="btn-tt btn-ghost">Annuler</a>
                        <button type="submit" class="btn-tt btn-primary">
                            <i class="bi bi-check-lg"></i> Ajouter l'activité
                        </button>
                    </div>

                </form>
            </div>
        </section>

    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>


</body>
</html>
