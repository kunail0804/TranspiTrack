<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TranspiTrack — Ajouter un type de sport</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <th:block th:replace="~{fragments/sidebar :: sidebar-styles}"></th:block>
</head>
<body>

<div class="layout">

    <nav th:replace="~{fragments/sidebar :: sidebar-nav(activePage='activities')}"></nav>

    <main class="main">

        <div class="page-header">
            <h1>Créer un type de sport</h1>
            <p>Ajoutez une nouvelle catégorie (ex: Sports d'hiver, Sports d'équipe, etc.).</p>
        </div>

        <section class="section">
            <div class="form-card" style="max-width: 600px;">
                <form th:object="${sportType}" method="post" action="/sport-types/add">
                    
                    <div class="form-group">
                        <label class="form-label" for="name">Nom de la catégorie <span class="required">*</span></label>
                        <div class="input-icon-wrap">
                            <i class="bi bi-tag input-icon"></i>
                            <input type="text" id="name" class="form-control" th:field="*{name}" placeholder="Ex: Sports aquatiques" required />
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="description">Description détaillée</label>
                        <textarea id="description" class="form-control" th:field="*{description}" rows="4" placeholder="Décrivez brièvement cette catégorie..."></textarea>
                    </div>

                    <div class="divider"></div>

                    <div class="d-flex justify-content-end gap-12">
                        <a href="/sport-types" class="btn-tt btn-ghost">Annuler</a>
                        <button type="submit" class="btn-tt btn-primary">
                            <i class="bi bi-check-lg"></i> Ajouter la catégorie
                        </button>
                    </div>

                </form>
            </div>
        </section>

    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
